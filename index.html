<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista de Compras</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
    <style>
        /* --- ESTILOS GERAIS E FONTES --- */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #e0f2f1 0%, #e8f5e9 100%); 
            padding: 0; margin: 0; min-height: 100vh; -webkit-tap-highlight-color: transparent;
        }
        
        /* --- TELA DE LOGIN --- */
        #telaLogin {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%; position: fixed; top: 0; left: 0;
            background: linear-gradient(135deg, #e0f2f1 0%, #e8f5e9 100%); z-index: 1000;
        }
        .login-caixa {
            background: #ffffff; padding: 40px 30px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 350px; text-align: center;
        }
        .login-caixa h1 { color: #2e7d32; margin-top: 0; font-weight: 900; font-size: 24px; }
        
        /* Campo de Senha com Olhinho */
        .campo-senha-container { position: relative; width: 100%; margin-bottom: 5px; }
        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #8bc34a; font-size: 20px; user-select: none;
        }

        /* --- CABEÇALHO DO APLICATIVO --- */
        .app-header {
            max-width: 500px; margin: 0 auto 15px auto;
            background: linear-gradient(to right, #dcedc8, #c5e1a5); color: #2e7d32;
            text-align: center; padding: 15px 20px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); font-size: 24px; font-weight: 900;
            letter-spacing: 1px; display: flex; align-items: center; justify-content: center;
            gap: 12px; border: 2px solid #ffffff;
        }

        .container { 
            max-width: 500px; margin: 0 auto; background: #ffffff; 
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            overflow: hidden; min-height: calc(100vh - 100px); 
        }
        
        /* --- NAVEGAÇÃO POR ABAS --- */
        .tabs { display: flex; background: #333333; }
        .tab-btn { 
            flex: 1; padding: 16px; color: #ffffff; background: none; border: none; 
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; 
            font-family: 'Nunito', sans-serif; touch-action: manipulation; user-select: none;
        }
        .tab-btn.active { background: #9ccc65; color: #1b5e20; }
        
        /* --- CONTEÚDO DAS ABAS --- */
        .tab-content { display: none; padding: 25px 20px; }
        .tab-content.active { display: block; }
        
        /* --- FORMULÁRIOS E INPUTS --- */
        label { font-weight: 700; margin-top: 15px; display: block; color: #455a64; font-size: 15px; }
        select, .custom-input, input[type="date"], input[type="number"], input[type="password"], input[type="text"] { 
            width: 100%; padding: 14px 15px; margin-top: 5px; margin-bottom: 5px; 
            border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; 
            font-size: 16px; font-family: 'Nunito', sans-serif; transition: border-color 0.3s;
            background-color: #fafafa; appearance: none; 
        }
        select:focus, .custom-input:focus, input:focus {
            border-color: #8bc34a; outline: none; background-color: #ffffff;
        }
        
        /* --- BOTÕES --- */
        button.btn-acao { 
            width: 100%; padding: 16px; background: linear-gradient(180deg, #aed581 0%, #8bc34a 100%); 
            color: #1b5e20; border: none; border-radius: 8px; font-size: 18px; font-weight: 900; 
            cursor: pointer; margin-top: 15px; box-shadow: 0 4px 10px rgba(139, 195, 74, 0.4); 
            font-family: 'Nunito', sans-serif; touch-action: manipulation;
        }

        #msgLogin, #mensagem { text-align: center; margin-top: 15px; font-weight: bold; font-size: 15px; min-height: 20px;}

        /* --- AUTOCOMPLETE --- */
        .autocomplete-container { position: relative; width: 100%; }
        .autocomplete-list { 
            position: absolute; top: calc(100% - 4px); left: 0; width: 100%; 
            background: white; border: 2px solid #8bc34a; border-radius: 0 0 8px 8px; 
            max-height: 200px; overflow-y: auto; z-index: 10; display: none; margin: 0; padding: 0; list-style: none; 
        }
        .autocomplete-list li { padding: 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-weight: 700;}

        /* --- PAINEL DO CARRINHO --- */
        .painel-total { background-color: #e8f5e9; border-bottom: 3px solid #8bc34a; padding: 18px; text-align: center; margin: -25px -20px 20px -20px; }
        .painel-total h3 { margin: 0; color: #2e7d32; font-size: 26px; font-weight: 900; }
        
        .item-lista { padding: 15px; border: 2px solid #eeeeee; background: #ffffff; margin-bottom: 12px; border-radius: 10px; border-left: 6px solid #2196f3; }
        .item-lista.comprado { border-left-color: #8bc34a; background: #f1f8e9; }
        .item-cabecalho { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .item-nome { font-size: 18px; font-weight: 900; color: #263238; }
        .item-qtd { background: #e0e0e0; padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: 700; cursor: pointer;}
        .item-edicao { display: flex; gap: 8px; }
        .btn-salvar-preco { width: 20%; background: #8bc34a; color: white; border: none; border-radius: 6px; font-weight: 900; }
        .btn-apagar { background: #ff5252; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: 900; margin-left: 5px;}

        /* --- MODAIS --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }
        .close-btn { float: right; font-size: 28px; cursor: pointer; color: #757575; font-weight: bold; }

        @media (max-width: 500px) {
            .app-header { border-radius: 0; margin-bottom: 0; }
            .container { border-radius: 0; min-height: 100vh; }
        }
    </style>
</head>
<body>

<datalist id="listaMercados"></datalist>

<div id="telaLogin">
    <div class="login-caixa">
        <h1>🛒 Acesso Restrito</h1>
        <p>Insira a senha da aba 'config'</p>
        
        <div class="campo-senha-container">
            <input type="password" id="senhaApp" placeholder="Sua senha..." onkeypress="verificarEnter(event)">
            <span class="toggle-password" onclick="toggleSenha()">👁️</span>
        </div>
        
        <button class="btn-acao" id="btnLogin" onclick="entrarApp()">Entrar</button>
        <div id="msgLogin"></div>
    </div>
</div>

<div id="appPrincipal" style="display: none;">
    <div class="app-header">🛒 COMPRAS MERCADO</div>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="mudarAba('addTab', this)">+ Adicionar</button>
            <button class="tab-btn" onclick="mudarAba('listTab', this)">Ir às Compras</button>
        </div>

        <div id="addTab" class="tab-content active">
            <label>Data:</label>
            <input type="date" id="dataCompra">
            <label>Categoria:</label>
            <select id="categoria" onchange="resetarProduto(); filtrarProdutos()">
                <option value="">Selecione...</option>
                <option value="Hortifruti">🍎 Hortifruti</option>
                <option value="Açougue e Peixaria">🥩 Açougue</option>
                <option value="Mercearia">🥫 Mercearia</option>
                <option value="Padaria e Confeitaria">🍞 Padaria</option>
                <option value="Frios e Laticínios">🧀 Frios</option>
                <option value="Congelados">❄️ Congelados</option>
                <option value="Higiene e Limpeza">🧼 Limpeza</option>
                <option value="Bazar e Utilidades">🍳 Bazar</option>
                <option value="Pet Shop">🐾 Pet Shop</option>
                <option value="Outras categorias">📦 Outros</option>
            </select>
            <label>Produto:</label>
            <div class="autocomplete-container">
                <input type="text" id="produto" placeholder="Ex: Maçã 🍎" oninput="filtrarProdutos()">
                <ul id="listaProdutos" class="autocomplete-list"></ul>
            </div>
            <label>Qtd ou Peso:</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" step="0.001" id="quantidade" style="flex: 2;">
                <select id="unidadeMedida" style="flex: 1;">
                    <option value="Un">Unidade</option>
                    <option value="Peso">Peso</option>
                    <option value="L">Litro</option>
                    <option value="Cx">Caixa</option>
                    <option value="Pct">Pacote</option>
                </select>
            </div>
            <button class="btn-acao" onclick="adicionarItem()">Colocar na Lista</button>
            <button class="btn-secundario" onclick="abrirModalCadastro()">➕ Cadastrar Produto Novo</button>
            <div id="mensagem"></div>
        </div>

        <div id="listTab" class="tab-content">
            <div class="painel-total"><h3 id="displayTotal">Total: R$ 0,00</h3></div>
            <input type="date" id="dataFiltro">
            <button class="btn-acao" style="background: #2196f3; color: white;" onclick="carregarLista()">Carregar Carrinho</button>
            <div id="resultadoLista"></div>
        </div>
    </div>
</div>

<div id="modalNovoProduto" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModalCadastro()">&times;</span>
        <h2 style="color:#2e7d32">✨ Novo Produto</h2>
        <label>Categoria:</label>
        <select id="modalCategoria">
            <option value="Hortifruti">🍎 Hortifruti</option>
            <option value="Açougue e Peixaria">🥩 Açougue</option>
            <option value="Mercearia">🥫 Mercearia</option>
            <option value="Padaria e Confeitaria">🍞 Padaria</option>
            <option value="Frios e Laticínios">🧀 Frios</option>
            <option value="Congelados">❄️ Congelados</option>
            <option value="Higiene e Limpeza">🧼 Limpeza</option>
            <option value="Bazar e Utilidades">🍳 Bazar</option>
            <option value="Pet Shop">🐾 Pet Shop</option>
            <option value="Outras categorias">📦 Outros</option>
        </select>
        <label>Nome + Emoji:</label>
        <input type="text" id="modalNome" placeholder="Ex: Pera 🍐">
        <button class="btn-acao" onclick="salvarProdutoBase()">Salvar na Base</button>
    </div>
</div>

<div id="modalEditarQtd" class="modal-overlay">
    <div class="modal-content">
        <span class="close-btn" onclick="fecharModalQtd()">&times;</span>
        <h2 style="color:#2e7d32">⚖️ Ajustar</h2>
        <p id="txtProdutoQtd" style="font-weight:bold"></p>
        <div style="display: flex; gap: 10px;">
            <input type="number" step="0.001" id="editQtdNumero" style="flex: 2;">
            <select id="editQtdUnidade" style="flex: 1;">
                <option value="Un">Unidade</option>
                <option value="Peso">Peso</option>
                <option value="L">Litro</option>
                <option value="Cx">Caixa</option>
                <option value="Pct">Pacote</option>
            </select>
        </div>
        <input type="hidden" id="editQtdId">
        <button class="btn-acao" onclick="salvarNovaQtd()">Salvar</button>
    </div>
</div>

<script>
    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbzL74zO2rnX1jyXnxEk9YaYBrghb7fycDwQ9tygL-ad-QAdXJyh0nV47ONwvMl2skU5ZA/exec';
    let baseDeProdutos = [];

    // --- FUNÇÕES DE LOGIN ---
    function toggleSenha() {
        const input = document.getElementById("senhaApp");
        const icon = document.querySelector(".toggle-password");
        if (input.type === "password") {
            input.type = "text";
            icon.innerText = "🙈";
        } else {
            input.type = "password";
            icon.innerText = "👁️";
        }
    }

    function verificarEnter(event) {
        if (event.key === "Enter") {
            entrarApp();
        }
    }

    function entrarApp() {
        let senha = document.getElementById("senhaApp").value;
        if(!senha) return;
        let btn = document.getElementById("btnLogin");
        let msg = document.getElementById("msgLogin");
        btn.innerText = "Verificando...";
        msg.innerText = "";

        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({ acao: "login", senha: senha }) })
        .then(r => r.json())
        .then(d => {
            if (d.status === "sucesso") {
                localStorage.setItem("appMercadoLogado", "sim");
                liberarAcesso();
            } else {
                btn.innerText = "Entrar";
                msg.style.color = "#ff5252";
                msg.innerText = "⚠️ Senha incorreta!";
            }
        });
    }

    function liberarAcesso() {
        document.getElementById("telaLogin").style.display = "none";
        document.getElementById("appPrincipal").style.display = "block";
        const dataHoje = new Date().toISOString().split('T')[0];
        document.getElementById('dataCompra').value = dataHoje;
        document.getElementById('dataFiltro').value = dataHoje;
        
        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({ acao: "carregarBase" }) })
            .then(response => response.json())
            .then(data => { baseDeProdutos = data; });
    }

    window.onload = function() {
        if (localStorage.getItem("appMercadoLogado") === "sim") liberarAcesso();
    };

    // --- LÓGICA DO APP ---
    function mudarAba(abaId, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(abaId).classList.add('active');
        btn.classList.add('active');
        if(abaId === 'listTab') carregarLista();
    }

    function filtrarProdutos() {
        let cat = document.getElementById("categoria").value;
        let texto = document.getElementById("produto").value.toLowerCase();
        let ul = document.getElementById("listaProdutos");
        ul.innerHTML = "";
        if (!cat) return;
        let filtrados = baseDeProdutos.filter(i => i[0].includes(cat) && i[1].toLowerCase().includes(texto));
        if (filtrados.length > 0) {
            ul.style.display = "block";
            filtrados.forEach(p => {
                let li = document.createElement("li");
                li.innerText = p[1];
                li.onclick = () => { document.getElementById("produto").value = p[1]; ul.style.display = "none"; };
                ul.appendChild(li);
            });
        } else { ul.style.display = "none"; }
    }
    
    function resetarProduto() { document.getElementById("produto").value = ""; }

    function adicionarItem() {
        const data = document.getElementById("dataCompra").value;
        const cat = document.getElementById("categoria").value;
        const prod = document.getElementById("produto").value;
        const qtd = document.getElementById("quantidade").value;
        const uni = document.getElementById("unidadeMedida").value;
        if (!data || !cat || !prod || !qtd) { alert("Preencha tudo!"); return; }
        
        document.getElementById("mensagem").innerText = "Salvando...";
        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({ acao: "adicionar", data: data, categoria: cat, produto: prod, quantidade: qtd + " " + uni }) })
        .then(r => r.json()).then(d => {
            document.getElementById("mensagem").innerText = d.status === "sucesso" ? "✅ Adicionado!" : "⚠️ Já existe!";
            setTimeout(() => document.getElementById("mensagem").innerText = "", 2000);
            if(d.status === "sucesso") { document.getElementById("produto").value = ""; document.getElementById("quantidade").value = ""; }
        });
    }

    function carregarLista() {
        const data = document.getElementById("dataFiltro").value;
        const div = document.getElementById("resultadoLista");
        div.innerHTML = "Carregando...";
        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({ acao: "listar", data: data }) })
        .then(r => r.json()).then(itens => {
            div.innerHTML = "";
            let total = 0;
            itens.forEach(item => {
                let p = parseFloat(String(item.preco).replace(',','.')) || 0;
                let q = parseFloat(String(item.quantidade).replace(',','.')) || 1;
                total += (p * q);
                let card = document.createElement("div");
                card.className = "item-lista " + (p > 0 ? "comprado" : "");
                card.innerHTML = `
                    <div class="item-cabecalho">
                        <span class="item-nome">${item.produto}</span>
                        <div>
                            <span class="item-qtd" onclick="abrirModalQtd('${item.id}','${item.produto}','${item.quantidade}')">${item.quantidade} ✏️</span>
                            <button class="btn-apagar" onclick="apagarItem('${item.id}')">X</button>
                        </div>
                    </div>
                    <div class="item-edicao">
                        <input type="number" step="0.01" id="p-${item.id}" placeholder="Preço" style="width:35%" value="${p > 0 ? p : ''}">
                        <input type="text" id="m-${item.id}" placeholder="Mercado" style="width:45%" value="${item.mercado || ''}">
                        <button class="btn-salvar-preco" onclick="salvarPreco('${item.id}')">✓</button>
                    </div>
                `;
                div.appendChild(card);
            });
            document.getElementById("displayTotal").innerText = "Total: R$ " + total.toFixed(2).replace('.',',');
        });
    }

    function salvarPreco(id) {
        let preco = document.getElementById(`p-${id}`).value;
        let mercado = document.getElementById(`m-${id}`).value;
        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({ acao: "atualizar", id: id, preco: preco, mercado: mercado }) })
        .then(() => carregarLista());
    }

    function apagarItem(id) {
        if(confirm("Apagar item?")) fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({ acao: "excluir", id: id }) }).then(() => carregarLista());
    }

    // MODAIS
    function abrirModalCadastro() { document.getElementById("modalNovoProduto").style.display = "flex"; }
    function fecharModalCadastro() { document.getElementById("modalNovoProduto").style.display = "none"; }
    function salvarProdutoBase() {
        let cat = document.getElementById("modalCategoria").value;
        let prod = document.getElementById("modalNome").value;
        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({ acao: "cadastrarProdutoBase", categoria: cat, produto: prod }) })
        .then(() => { fecharModalCadastro(); location.reload(); });
    }

    function abrirModalQtd(id, prod, qtd) {
        document.getElementById("editQtdId").value = id;
        document.getElementById("txtProdutoQtd").innerText = prod;
        document.getElementById("modalEditarQtd").style.display = "flex";
    }
    function fecharModalQtd() { document.getElementById("modalEditarQtd").style.display = "none"; }
    function salvarNovaQtd() {
        let id = document.getElementById("editQtdId").value;
        let n = document.getElementById("editQtdNumero").value;
        let u = document.getElementById("editQtdUnidade").value;
        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({ acao: "atualizarQtd", id: id, quantidade: n + " " + u }) })
        .then(() => { fecharModalQtd(); carregarLista(); });
    }
</script>
</body>
</html>
