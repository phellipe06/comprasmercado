<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista de Compras</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body { font-family: 'Nunito', sans-serif; background: #e8f5e9; padding: 0; margin: 0; min-height: 100vh; }
        
        /* LOGIN ESTILO PRINT 2 */
        #telaLogin {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%; position: fixed; top: 0; left: 0; background: #e8f5e9; z-index: 2000;
        }
        .login-caixa {
            background: #ffffff; padding: 40px 30px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 350px; text-align: center;
        }
        .login-caixa h1 { color: #2e7d32; margin-bottom: 20px; font-weight: 900; }
        
        .input-com-icone {
            display: flex; align-items: center; width: 100%;
            border: 2px solid #ddd; border-radius: 8px; background-color: #fafafa;
            box-sizing: border-box; margin-bottom: 20px;
        }
        .input-com-icone:focus-within { border-color: #8bc34a; background-color: #fff; }
        .input-com-icone span { padding: 0 12px; font-size: 18px; color: #8bc34a; }
        .input-com-icone input {
            flex: 1; border: none; background: transparent; padding: 14px 5px;
            font-size: 16px; font-family: 'Nunito'; outline: none;
        }

        /* CABEÇALHO */
        .app-header { background: #2e7d32; color: white; text-align: center; padding: 15px; font-size: 20px; font-weight: 900; }
        .container { max-width: 500px; margin: 0 auto; background: #ffffff; min-height: 100vh; }
        
        /* ABAS */
        .tabs { display: flex; background: #333; position: sticky; top: 0; z-index: 100; }
        .tab-btn { flex: 1; padding: 15px; color: white; border: none; background: none; font-weight: 700; cursor: pointer; }
        .tab-btn.active { background: #8bc34a; color: #1b5e20; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        
        /* FORMULÁRIO */
        label { font-weight: 700; display: block; margin-top: 15px; color: #444; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; font-family: 'Nunito'; }

        /* AUTOCOMPLETE */
        .autocomplete-container { position: relative; width: 100%; }
        .input-wrapper { position: relative; }
        .input-wrapper::after { content: '▼'; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 12px; color: #8bc34a; pointer-events: none; }
        .autocomplete-list { position: absolute; width: 100%; background: white; border: 2px solid #8bc34a; border-top: none; border-radius: 0 0 8px 8px; z-index: 1000; max-height: 250px; overflow-y: auto; list-style: none; padding: 0; margin: 0; display: none; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .autocomplete-list li { padding: 14px; border-bottom: 1px solid #eee; cursor: pointer; font-weight: 700; color: #333; }

        .btn-acao { width: 100%; padding: 16px; background: #8bc34a; color: #1b5e20; border: none; border-radius: 8px; font-size: 18px; font-weight: 900; cursor: pointer; margin-top: 20px; }
        .btn-secundario { width: 100%; padding: 10px; background: none; border: 2px dashed #8bc34a; color: #2e7d32; border-radius: 8px; margin-top: 10px; font-weight: 700; cursor: pointer; }

        /* CARRINHO */
        .painel-total { background: #e8f5e9; padding: 15px; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #8bc34a; position: sticky; top: 50px; z-index: 90; }
        .item-lista { padding: 15px; border: 1px solid #eee; border-left: 6px solid #2196f3; margin-bottom: 12px; border-radius: 10px; }
        .item-cabecalho { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 15px; }
        .item-nome { font-size: 17px; font-weight: 900; flex: 1; word-break: break-word; }
        .item-qtd { background: #e0e0e0; padding: 6px 10px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; }
        .btn-apagar { background: #ff5252; color: white; border: none; width: 32px; height: 32px; border-radius: 6px; font-weight: 900; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div id="telaLogin">
    <div class="login-caixa">
        <h1>🔒 Acesso</h1>
        <div class="input-com-icone">
            <span>🛒</span>
            <input type="password" id="senhaApp" placeholder="Senha do App..." onkeypress="if(event.key==='Enter') entrarApp()">
            <span style="cursor:pointer" onclick="toggleSenha()">👁️</span>
        </div>
        <button class="btn-acao" id="btnLogin" onclick="entrarApp()">Entrar</button>
        <div id="msgLogin" style="margin-top:15px; font-weight:bold"></div>
    </div>
</div>

<div id="appPrincipal" style="display:none">
    <div class="app-header">🛒 LISTA DE COMPRAS</div>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="mudarAba('addTab', this)">ADICIONAR</button>
            <button class="tab-btn" onclick="mudarAba('listTab', this)">CARRINHO</button>
        </div>

        <div id="addTab" class="tab-content active">
            <label>Data:</label>
            <input type="date" id="dataCompra">
            
            <label>Categoria:</label>
            <select id="categoria" onchange="limparBusca();">
                <option value="">Escolha...</option>
                <option value="Hortifruti">🍎 Hortifruti</option>
                <option value="Açougue e Peixaria">🥩 Açougue</option>
                <option value="Mercearia">🥫 Mercearia</option>
                <option value="Padaria e Confeitaria">🍞 Padaria</option>
                <option value="Frios e Laticínios">🧀 Frios</option>
                <option value="Congelados">❄️ Congelados</option>
                <option value="Higiene e Limpeza">🧼 Limpeza</option>
                <option value="Bazar e Utilidades">🍳 Bazar</option>
                <option value="Pet Shop">🐾 Pet Shop</option>
                <option value="Outras categorias">📦 Outros</option>
            </select>

            <label>Produto:</label>
            <div class="autocomplete-container">
                <div class="input-wrapper">
                    <input type="text" id="produto" placeholder="Toque para ver a lista..." onfocus="filtrar()" onclick="filtrar()" oninput="filtrar()" autocomplete="off">
                </div>
                <ul id="listaSugerida" class="autocomplete-list"></ul>
            </div>

            <label>Qtd ou Peso:</label>
            <div style="display:flex; gap:10px">
                <input type="number" step="0.001" id="qtd" style="flex:2">
                <select id="uni" style="flex:1">
                    <option value="Un">Un</option>
                    <option value="Peso">Kg</option>
                    <option value="L">Litro</option>
                </select>
            </div>
            <button class="btn-acao" onclick="add()">Salvar na Lista</button>
            <button class="btn-secundario" onclick="document.getElementById('mNovo').style.display='flex'">➕ Novo Produto na Base</button>
            <div id="msgAdd" style="text-align:center; margin-top:10px; font-weight:bold"></div>
        </div>

        <div id="listTab" class="tab-content">
            <div class="painel-total"><h2 id="vTotal" style="margin:0; color:#2e7d32">R$ 0,00</h2></div>
            <input type="date" id="dataFiltro" onchange="listar()">
            <div id="listaResult" style="margin-top:20px"></div>
            <button class="btn-secundario" style="margin-top:40px; border-color:#ccc; color:#888" onclick="sairApp()">Sair / Trocar Senha</button>
        </div>
    </div>
</div>

<div id="mNovo" class="modal">
    <div class="modal-content">
        <h3>✨ Novo na Base</h3>
        <input type="text" id="nNome" placeholder="Ex: Melancia 🍉">
        <button class="btn-acao" onclick="cadastrarBase()">Salvar</button>
        <button class="btn-secundario" onclick="document.getElementById('mNovo').style.display='none'">Fechar</button>
    </div>
</div>

<div id="modalEditarQtd" class="modal">
    <div class="modal-content">
        <h3>⚖️ Ajustar Qtd</h3>
        <p id="txtProdutoQtd" style="font-weight:bold; color:#2e7d32"></p>
        <input type="number" step="0.001" id="editQtdNumero">
        <button class="btn-acao" onclick="salvarNovaQtd()">OK</button>
    </div>
</div>

<script>
    const URL = 'https://script.google.com/macros/s/AKfycbzL74zO2rnX1jyXnxEk9YaYBrghb7fycDwQ9tygL-ad-QAdXJyh0nV47ONwvMl2skU5ZA/exec';
    let base = [];
    let idEditando = "";

    function toggleSenha() {
        const i = document.getElementById("senhaApp");
        i.type = i.type === "password" ? "text" : "password";
    }

    function entrarApp() {
        const s = document.getElementById("senhaApp").value;
        const btn = document.getElementById("btnLogin");
        btn.innerText = "Validando...";
        fetch(URL, { method: 'POST', body: JSON.stringify({ acao: "login", senha: s }) })
        .then(r => r.json()).then(d => {
            if(d.status === "sucesso") {
                localStorage.setItem("mercado_v3_logado", "sim");
                liberarApp();
            } else {
                btn.innerText = "Entrar";
                document.getElementById("msgLogin").style.color = "red";
                document.getElementById("msgLogin").innerText = "❌ Senha Incorreta";
            }
        });
    }

    function sairApp() { localStorage.removeItem("mercado_v3_logado"); location.reload(); }

    function liberarApp() {
        document.getElementById("telaLogin").style.display = "none";
        document.getElementById("appPrincipal").style.display = "block";
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById("dataCompra").value = hoje;
        document.getElementById("dataFiltro").value = hoje;
        fetch(URL, { method: 'POST', body: JSON.stringify({ acao: "carregarBase" }) }).then(r => r.json()).then(d => { base = d; });
    }

    window.onload = () => { if(localStorage.getItem("mercado_v3_logado") === "sim") liberarApp(); };

    function mudarAba(id, b) {
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        b.classList.add("active");
        if(id === 'listTab') listar();
    }

    function limparBusca() { document.getElementById('produto').value = ''; document.getElementById("listaSugerida").style.display = "none"; }

    function filtrar() {
        const cat = document.getElementById("categoria").value;
        const txt = document.getElementById("produto").value.toLowerCase().trim();
        const ul = document.getElementById("listaSugerida");
        ul.innerHTML = "";
        if(!cat) { ul.style.display = "none"; return; }
        const resultados = base.filter(i => String(i[0]).includes(cat) && String(i[1]).toLowerCase().includes(txt));
        if(resultados.length) {
            ul.style.display = "block";
            resultados.forEach(item => {
                let li = document.createElement("li");
                li.innerText = item[1];
                li.onmousedown = (e) => { e.preventDefault(); document.getElementById("produto").value = item[1]; ul.style.display = "none"; };
                ul.appendChild(li);
            });
        } else { ul.style.display = "none"; }
    }

    function add() {
        const p = document.getElementById("produto").value;
        const q = document.getElementById("qtd").value;
        if (!p || !q) { alert("Preencha Produto e Qtd!"); return; }
        const dados = { acao: "adicionar", data: document.getElementById("dataCompra").value, categoria: document.getElementById("categoria").value, produto: p, quantidade: q + " " + document.getElementById("uni").value };
        fetch(URL, { method: 'POST', body: JSON.stringify(dados) }).then(() => {
            document.getElementById("msgAdd").innerText = "✅ Salvo!";
            document.getElementById("produto").value = ""; document.getElementById("qtd").value = "";
            setTimeout(() => document.getElementById("msgAdd").innerText = "", 2000);
        });
    }

    function listar() {
        const d = document.getElementById("dataFiltro").value;
        const res = document.getElementById("listaResult");
        res.innerHTML = "Carregando...";
        fetch(URL, { method: 'POST', body: JSON.stringify({ acao: "listar", data: d }) }).then(r => r.json()).then(itens => {
            res.innerHTML = ""; let total = 0;
            itens.forEach(i => {
                let p = parseFloat(String(i.preco).replace(',','.')) || 0;
                let q = parseFloat(String(i.quantidade).replace(',','.')) || 1;
                total += (p * q);
                let div = document.createElement("div");
                div.className = "item-lista";
                if(p > 0) div.style.borderLeftColor = "#8bc34a";
                div.innerHTML = `
                    <div class="item-cabecalho">
                        <span class="item-nome">${i.produto}</span>
                        <div class="item-controles-topo">
                            <span class="item-qtd" onclick="abrirModalQtd('${i.id}','${i.produto}','${i.quantidade}')">${i.quantidade} ✏️</span>
                            <button class="btn-apagar" onclick="excluir('${i.id}')">X</button>
                        </div>
                    </div>
                    <div style="display:flex; gap:8px">
                        <input type="number" id="p-${i.id}" step="0.01" placeholder="R$" value="${p||''}" style="width:35%">
                        <input type="text" id="m-${i.id}" placeholder="Mercado" value="${i.mercado||''}" style="width:45%">
                        <button onclick="salvar('${i.id}')" style="width:20%; background:#8bc34a; border:none; border-radius:8px; color:white; font-weight:bold">✓</button>
                    </div>
                `;
                res.appendChild(div);
            });
            document.getElementById("vTotal").innerText = "R$ " + total.toFixed(2).replace('.',',');
        });
    }

    function salvar(id) {
        const p = document.getElementById("p-"+id).value;
        const m = document.getElementById("m-"+id).value;
        fetch(URL, { method: 'POST', body: JSON.stringify({ acao: "atualizar", id: id, preco: p, mercado: m }) }).then(() => listar());
    }

    function excluir(id) { if(confirm("Apagar item?")) fetch(URL, { method: 'POST', body: JSON.stringify({ acao: "excluir", id: id }) }).then(() => listar()); }

    function abrirModalQtd(id, prod, qtd) {
        idEditando = id;
        document.getElementById("txtProdutoQtd").innerText = prod;
        document.getElementById("editQtdNumero").value = parseFloat(qtd) || 0;
        document.getElementById("modalEditarQtd").style.display = "flex";
    }

    function salvarNovaQtd() {
        const n = document.getElementById("editQtdNumero").value;
        fetch(URL, { method: 'POST', body: JSON.stringify({ acao: "atualizarQtd", id: idEditando, quantidade: n + " Peso" }) }).then(() => {
            document.getElementById("modalEditarQtd").style.display = "none";
            listar();
        });
    }

    function cadastrarBase() {
        const c = document.getElementById("categoria").value;
        const n = document.getElementById("nNome").value;
        if(!c || !n) return alert("Escolha categoria e nome!");
        fetch(URL, { method: 'POST', body: JSON.stringify({ acao: "cadastrarProdutoBase", categoria: c, produto: n }) }).then(() => {
            document.getElementById("mNovo").style.display = "none";
            fetch(URL, { method: 'POST', body: JSON.stringify({ acao: "carregarBase" }) }).then(r => r.json()).then(d => { base = d; });
        });
    }
</script>
</body>
</html>
